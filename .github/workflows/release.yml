name: Release

on:
  push:
    branches:
      - pre-release
      - master
      - develop

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '23.11.1'

      - name: Install dependencies
        run: yarn install

      - name: Set TARGET_BROWSER environment variable
        run: echo "TARGET_BROWSER=chrome" >> $GITHUB_ENV

      - name: Build project for Chrome
        run: yarn run build:chrome

      - name: Build project for Canary
        run: yarn run build:canary

      - name: List files in build directory
        run: ls -l ./build

      - name: Set asset name for Chrome
        id: set_asset_name_chrome
        run: |
          ASSET_NAME_CHROME="$(find build -maxdepth 1 -type f -name 'pali-wallet-production-chrome-*.zip' -printf '%f\n')"
          ASSET_COUNT_CHROME="$(printf '%s\n' "${ASSET_NAME_CHROME}" | sed '/^$/d' | wc -l)"
          if [ "${ASSET_COUNT_CHROME}" -ne 1 ]; then
            echo "::error::Expected exactly one Chrome release zip, found ${ASSET_COUNT_CHROME}."
            exit 1
          fi
          echo "ASSET_NAME_CHROME=${ASSET_NAME_CHROME}" >> "$GITHUB_ENV"

      - name: Set asset name for Canary
        id: set_asset_name_canary
        run: |
          ASSET_NAME_CANARY="$(find build -maxdepth 1 -type f -name 'pali-wallet-canary-chrome-*.zip' -printf '%f\n')"
          ASSET_COUNT_CANARY="$(printf '%s\n' "${ASSET_NAME_CANARY}" | sed '/^$/d' | wc -l)"
          if [ "${ASSET_COUNT_CANARY}" -ne 1 ]; then
            echo "::error::Expected exactly one Canary release zip, found ${ASSET_COUNT_CANARY}."
            exit 1
          fi
          echo "ASSET_NAME_CANARY=${ASSET_NAME_CANARY}" >> "$GITHUB_ENV"

      - name: Get package version
        id: get_version
        run: |
          PACKAGE_VERSION="$(jq -r '.version' package.json)"
          if [ "${GITHUB_REF_NAME}" = "master" ]; then
            RELEASE_TAG="v${PACKAGE_VERSION}"
          else
            SAFE_REF_NAME="$(echo "${GITHUB_REF_NAME}" | tr '/' '-')"
            RELEASE_TAG="v${PACKAGE_VERSION}-${SAFE_REF_NAME}"
          fi

          echo "PACKAGE_VERSION=${PACKAGE_VERSION}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"

      - name: Ensure release tag is new
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "::error::Release tag ${RELEASE_TAG} already exists. Bump package.json version or delete the existing draft/tag intentionally before releasing again."
            exit 1
          fi

      - name: Create draft release from current commit
        run: |
          gh release create "${RELEASE_TAG}" \
            "./build/${ASSET_NAME_CHROME}" \
            "./build/${ASSET_NAME_CANARY}" \
            --target "${GITHUB_SHA}" \
            --title "Release ${GITHUB_REPOSITORY#*/} for ${GITHUB_REF_NAME} (v${PACKAGE_VERSION})" \
            --notes "Built from ${GITHUB_SHA}." \
            --draft \
            --prerelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
