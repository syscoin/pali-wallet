on:
  pull_request:
    types: [opened, synchronize]
jobs:
  test:
    name: yarn test-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '23.11.1'
          check-latest: true
      - run: yarn install
      - run: yarn test-all
  visual:
    name: visual regression suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '23.11.1'
          check-latest: true
      - run: yarn install
      - run: npx playwright install --with-deps chromium
      - name: Build extension
        run: yarn build:chrome
      - name: Run visual baselines
        # --update-snapshots=missing: brand-new screens write their baseline
        # (uploaded below for committing) without failing the job; any
        # *changed* screen still fails. Commit the generated linux baselines
        # under e2e/visual/__screenshots__/ to enforce them.
        run: yarn e2e:visual --update-snapshots=missing
      - name: Upload visual artifacts (diffs + new baselines)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-artifacts-${{ github.run_id }}
          path: |
            e2e/visual/__screenshots__/
            e2e/artifacts/
          retention-days: 14
  secrets:
    name: Create env file with gh secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '23.11.1'
          check-latest: true
      - run: yarn install
      - run: |
          touch .env
          echo REACT_APP_SEED_LAW_COOK=${{ secrets.SEED_LAW_COOK }} >> .env
          echo REACT_APP_SEED_PEACE_GLOBE=${{ secrets.SEED_PEACE_GLOBE }} >> .env
          echo REACT_APP_SEED_SWALLOW_HEALTH=${{ secrets.SEED_SWALLOW_HEALTH }} >> .env
